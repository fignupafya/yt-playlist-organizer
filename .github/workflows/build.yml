name: Build Android APK

# Runs on every push and on manual trigger.
on:
  push:
  workflow_dispatch:

# Needed so the workflow can create/update the "latest" Release via GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: youtube-playlist-organizer-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.5.1'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      # Publish/refresh a rolling "latest" prerelease with the raw APK attached.
      # (No build artifact: the Actions artifact would only download as a .zip;
      #  the Release gives a direct, unzipped, permanent .apk instead.)
      # Stable download URL:
      #   https://github.com/<owner>/<repo>/releases/download/latest/YouTube-Liste-Duzenleyici.apk
      - name: Publish APK to "latest" Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER=$(grep -oP 'versionName "\K[^"]+' app/build.gradle)
          SHA="${GITHUB_SHA::7}"
          cp app/build/outputs/apk/debug/app-debug.apk YouTube-Liste-Duzenleyici.apk
          NOTES="Auto-built from the latest commit on main ($SHA) — version $VER. Direct download: the YouTube-Liste-Duzenleyici.apk asset below."
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest YouTube-Liste-Duzenleyici.apk --clobber
            gh release edit latest --title "Latest build (v$VER)" --notes "$NOTES" --prerelease
          else
            gh release create latest YouTube-Liste-Duzenleyici.apk --title "Latest build (v$VER)" --notes "$NOTES" --prerelease
          fi
